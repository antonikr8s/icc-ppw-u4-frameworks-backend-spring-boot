version: '3.8'

services:
  # Base de Datos PostgreSQL para el entorno contenedorizado
  postgres_prod:
    image: postgres:15-alpine
    container_name: server_back_postgres
    restart: always
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: ups
      POSTGRES_PASSWORD: ups123
    ports:
      - "5433:5432" # Expone el puerto hacia afuera si necesitas revisarla desde DBeaver
    volumes:
      - postgres_production_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ups -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Tu API de Spring Boot
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server_back_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres_prod:5432/devdb # Conexión interna usando el nombre del servicio
      DB_USERNAME: ups
      DB_PASSWORD: ups123
      JWT_SECRET: mySecretKeyForJWT2024MustBeAtLeast256BitsLongForHS256Algorithm
      JWT_EXPIRATION: 1800000
      JWT_REFRESH_EXPIRATION: 604800000
    depends_on:
      postgres_prod:
        condition: service_healthy # No inicia la API hasta que la base de datos esté lista para recibir conexiones
    networks:
      - app-network

volumes:
  postgres_production_data:
    driver: local

networks:
  app-network:
    driver: bridge